<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập / Đăng ký - BOOKSTORE</title>
    <link rel="stylesheet" href="../assets/css/dinh-dang.css">
    <style>
        /* CSS riêng cho khu vực Đăng nhập/Đăng ký */
        body {
            background: linear-gradient(135deg, #f4f7f6, #e0e8e4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* Phần Header chứa 2 Tab */
        .auth-header {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        .auth-tab {
            flex: 1;
            padding: 18px 0;
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .auth-tab.active {
            background: #ffffff;
            color: #f39c12;
            border-bottom: 3px solid #f39c12;
        }

        .auth-tab:hover:not(.active) {
            color: #2c3e50;
        }

        /* Khu vực nhập liệu */
        .auth-body {
            padding: 35px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 15px;
            box-sizing: border-box; /* Giữ khung input không bị tràn */
        }

        .form-group input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background: #f39c12;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
            transform: translateY(-2px);
        }

        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #e74c3c;
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-pass:hover { text-decoration: underline; }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-home:hover { color: #2c3e50; }

        #form-register { display: none; }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: #2c3e50; font-family: 'Lobster', cursive; margin:0; font-size: 36px;">
            🐵 Bookstore
        </h1>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Tạo tài khoản</div>
        </div>

        <div class="auth-body">
            <form id="form-login">
                <div class="form-group">
                    <label>Email hoặc Tên tài khoản</label>
                    <input type="text" id="login-username" placeholder="Nhập tài khoản của bạn" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <a href="#" class="forgot-pass">Quên mật khẩu?</a>

                <button type="submit" class="btn-submit">Đăng nhập</button>
            </form>

            <form id="form-register">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" placeholder="VD: Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Tạo mật khẩu" required>
                </div>

                <button type="submit" class="btn-submit" style="background: #27ae60;">Đăng ký ngay</button>
            </form>
        </div>
    </div>

    <a href="index.html" class="back-home">← Quay lại Trang chủ</a>
</div>

<script>
    // 1. Hàm chuyển đổi qua lại giữa form Đăng nhập & Đăng ký
    function switchTab(tabName) {
        var loginForm = document.getElementById('form-login');
        var registerForm = document.getElementById('form-register');
        var loginTab = document.getElementById('tab-login');
        var registerTab = document.getElementById('tab-register');

        if (tabName === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }
    }

    // 2. Xử lý khi ấn nút Đăng nhập
    document.getElementById('form-login').addEventListener('submit', function(event) {
        event.preventDefault(); // Chặn load lại trang

        // Lấy dữ liệu người dùng gõ
        var username = document.getElementById('login-username').value.toLowerCase();
        var password = document.getElementById('login-password').value;

        // Kiểm tra tài khoản admin và mật khẩu
        if (username === 'admin') {
            if (password === '12345678') {
                alert('Đăng nhập thành công với quyền: QUẢN TRỊ VIÊN');
                window.location.href = 'index-admin.html';
            } else {
                alert('Sai mật khẩu quản trị! Vui lòng nhập lại.');
                document.getElementById('login-password').value = ''; // Xóa pass nhập sai
            }
        }
        // Tài khoản khách hàng
        else {
            alert('Đăng nhập thành công với quyền: KHÁCH HÀNG');
            sessionStorage.setItem('tenKhachHang', username);
            window.location.href = 'index.html';
        }
    });

    // 3. Xử lý khi ấn nút Đăng ký
    document.getElementById('form-register').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Tạo tài khoản thành công! Vui lòng đăng nhập.');
        switchTab('login');
    });
</script>

</body>
</html>
