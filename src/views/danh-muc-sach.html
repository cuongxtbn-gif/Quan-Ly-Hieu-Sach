        { title: "Bá Tước Monte Cristo", price: 185000, img: src="../assets/images/ba-tuoc-monte-cristo.jpg", category: "Văn học" },
        { title: "Bố Già", price: 105000, img: src="../assets/images/bo-gia.png", category: "Văn học" },
        { title: "Không Gia Đình", price: 450000, img: src="../assets/images/khong-gia-dinh.jpg", category: "Văn học" },
    ];

    // 2. BIẾN CẤU HÌNH & QUẢN LÝ
    const soSachMoiTrang = 16;
    let trangHienTai = 1;
    let dsDangHienThi = [...dsSach]; // Danh sách phụ để lọc

    // 3. HÀM HIỂN THỊ SÁCH
    function hienThiSach(danhSach, trang) {
        const container = document.querySelector('.book-catalog-grid');
        if (!container) return; // Nếu mất "kệ sách" thì dừng luôn

        container.innerHTML = "";
        const batDau = (trang - 1) * soSachMoiTrang;
        const ketThuc = batDau + soSachMoiTrang;
        const sachTrongTrang = danhSach.slice(batDau, ketThuc);

        sachTrongTrang.forEach(sach => {
            const bookHTML = `
            <div class="book-card">
                <div class="book-img">
                    <img src="${sach.img}"
                         style="width: 100%; height: 100%; object-fit: cover;"
                         alt="${sach.title}"
                         onerror="this.src='https://via.placeholder.com/200x300?text=Loi+Anh'">
                </div>
                <div class="book-content">
                    <div class="book-title">${sach.title}</div>
                    <div class="price">${sach.price.toLocaleString('vi-VN')} đ</div>
                    <button class="btn-buy">Mua ngay</button>
                </div>
            </div>`;
            container.innerHTML += bookHTML;
        });
    }

    // 4. HÀM BỘ LỌC VÀ SẮP XẾP
    function capNhatCuaHang() {
        let ketQua = [...dsSach];

        // Lọc thể loại
        const theLoai = document.getElementById('category-select').value;
        if (theLoai !== "Tất cả") {
            ketQua = ketQua.filter(s => s.category === theLoai);
        }

        // Sắp xếp
        const sapXep = document.getElementById('sort-select').value;
        if (sapXep === "high-low") ketQua.sort((a, b) => b.price - a.price);
        else if (sapXep === "low-high") ketQua.sort((a, b) => a.price - b.price);

        dsDangHienThi = ketQua;
        trangHienTai = 1; // Chọn xong thì về trang 1

        capNhatMauNutPhanTrang();
        hienThiSach(dsDangHienThi, trangHienTai);
    }

    // 5. CHỨC NĂNG NÚT PHÂN TRANG
    const nutPhanTrang = document.querySelectorAll('.page-btn');

    function capNhatMauNutPhanTrang() {
        nutPhanTrang.forEach(n => n.classList.remove('active'));
        nutPhanTrang.forEach(n => {
            if (parseInt(n.innerText) === trangHienTai) n.classList.add('active');
        });
    }

    nutPhanTrang.forEach(nut => {
        nut.addEventListener('click', function() {
            const giaTriNut = this.innerText;

            if (giaTriNut === "1") trangHienTai = 1;
            else if (giaTriNut === "2") trangHienTai = 2;
            else if (giaTriNut === "3") trangHienTai = 3;
            else if (giaTriNut.includes("Tiếp theo")) {
                const tongSoTrang = Math.ceil(dsDangHienThi.length / soSachMoiTrang);
                if (trangHienTai < tongSoTrang) trangHienTai++;
            }

            capNhatMauNutPhanTrang();
            hienThiSach(dsDangHienThi, trangHienTai);
            window.scrollTo({ top: 300, behavior: 'smooth' });
        });
    });

    // 6. GẮN SỰ KIỆN & KHỞI CHẠY BẮT ĐẦU
    document.getElementById('sort-select').addEventListener('change', capNhatCuaHang);
    document.getElementById('category-select').addEventListener('change', capNhatCuaHang);

    // Ra lệnh máy vẽ sách ra lúc mới mở web
    hienThiSach(dsDangHienThi, trangHienTai);

</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Lục tìm trong bộ nhớ xem có tên khách hàng không
        var tenUser = sessionStorage.getItem('tenKhachHang');

        if (tenUser) { // Nếu có người đang đăng nhập
            var menuLogin = document.getElementById('menu-login');

            // Đổi chữ thành tên người dùng
            menuLogin.innerHTML = `
                <a href="#" style="color: #f39c12; font-weight: bold;">👋 Chào, ${tenUser}</a>
                <a href="#" onclick="dangXuat()" style="font-size: 12px; color: #e74c3c; margin-left: 5px; cursor: pointer;">(Thoát)</a>
            `;
        }
    });

    // Hàm xử lý khi bấm nút (Thoát)
    function dangXuat() {
        sessionStorage.removeItem('tenKhachHang'); // Xóa tên khỏi bộ nhớ
        window.location.href = 'index.html'; // Đăng xuất xong thì văng về trang chủ
    }
</script>
