<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Hệ thống Quản trị - BOOKSTORE</title>
  <link rel="stylesheet" href="../assets/css/dinh-dang.css">

  <style>
    /* CSS BỔ SUNG DÀNH RIÊNG CHO GIAO DIỆN ADMIN */
    body {
        display: flex;
        background-color: #f4f7f6;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* 1. THANH MENU BÊN TRÁI (SIDEBAR) */
    .sidebar {
        width: 280px;
        background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
        color: white;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        overflow-y: auto;
    }

    .sidebar-header {
        padding: 25px 20px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 20px;
    }

    .sidebar-header h2 {
        margin: 0;
        color: #f39c12;
        font-family: 'Lobster', cursive;
        font-size: 28px;
        letter-spacing: 2px;
    }

    .sidebar-header p {
        margin: 5px 0 0 0;
        font-size: 12px;
        color: #bdc3c7;
        text-transform: uppercase;
    }

    /* Danh sách chức năng (Lấy từ sơ đồ draw.io của bạn) */
    .admin-menu {
        list-style: none;
        padding: 0 15px;
        margin: 0;
    }

    .admin-menu li {
        margin-bottom: 8px;
    }

    .admin-menu a {
        display: flex;
        align-items: center;
        padding: 15px 20px;
        color: #ecf0f1;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    /* Hiệu ứng hover và menu đang chọn (Active) */
    .admin-menu a:hover, .admin-menu a.active {
        background-color: #f39c12;
        color: #fff;
        box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
        transform: translateX(5px); /* Trượt nhẹ sang phải */
    }

    .admin-menu i {
        margin-right: 15px;
        font-size: 18px;
    }

    /* Nút đăng xuất nằm dưới cùng */
    .logout-btn {
        margin-top: 50px;
        background-color: rgba(231, 76, 60, 0.2) !important;
        color: #e74c3c !important;
        border: 1px solid rgba(231, 76, 60, 0.5);
    }
    .logout-btn:hover {
        background-color: #e74c3c !important;
        color: #fff !important;
        transform: translateX(0) !important;
    }

    /* 2. KHU VỰC NỘI DUNG CHÍNH (MAIN CONTENT) */
    .main-content {
        margin-left: 280px; /* Đẩy nội dung ra tránh cái sidebar */
        padding: 40px;
        width: calc(100% - 280px);
        box-sizing: border-box;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        background: white;
        padding: 20px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .page-header h1 {
        margin: 0;
        color: #2c3e50;
        font-size: 24px;
    }

    /* Re-style lại mấy cái thẻ Card cho đẹp hơn */
    .card-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 40px;
    }

    .stat-card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        border-bottom: 4px solid #3498db;
    }

    .stat-card:nth-child(2) { border-color: #2ecc71; }
    .stat-card:nth-child(3) { border-color: #f1c40f; }
    .stat-card:nth-child(4) { border-color: #e74c3c; }

    .stat-card h3 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; }
    .stat-card .value { font-size: 28px; font-weight: bold; color: #2c3e50; }
  </style>
</head>
